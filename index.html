<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI Digest — filtered for the things that compound</title>
<!-- Add-to-Home-Screen (iPhone/iPad): opens fullscreen like a native app -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI Digest">
<meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230d1117'/%3E%3Ctext x='90' y='118' font-size='96' text-anchor='middle' fill='%235b9dff' font-family='Arial' font-weight='bold'%3EAI%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --ink:#e6edf3;
    --muted:#9aa7b4; --line:#2a3340; --accent:#5b9dff; --accent2:#7ee0c0;
    --warn:#ffcf70; --chip:#233042; --chipink:#c7d3e0; --shadow:rgba(0,0,0,.35);
  }
  html[data-theme="light"]{
    --bg:#f6f8fb; --panel:#ffffff; --panel2:#f0f4f9; --ink:#111823;
    --muted:#5b6774; --line:#e2e8f0; --accent:#1f6feb; --accent2:#0a8f6c;
    --warn:#b06f00; --chip:#eef2f7; --chipink:#33404f; --shadow:rgba(20,40,80,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
  .wrap{max-width:860px;margin:0 auto;
    padding:calc(34px + env(safe-area-inset-top)) 20px calc(72px + env(safe-area-inset-bottom))}
  .controls{padding-top:calc(16px + env(safe-area-inset-top))}

  header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;
    border-bottom:1px solid var(--line);padding-bottom:20px}
  .kicker{letter-spacing:.14em;text-transform:uppercase;font-size:12px;color:var(--accent);font-weight:800}
  h1{font-size:30px;line-height:1.12;margin:8px 0 4px;font-weight:800;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:13.5px}
  .toggle{flex:none;cursor:pointer;border:1px solid var(--line);background:var(--panel);
    color:var(--ink);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;
    display:flex;align-items:center;gap:7px;box-shadow:0 1px 3px var(--shadow)}
  .toggle:hover{border-color:var(--accent)}

  .controls{position:sticky;top:0;z-index:5;background:var(--bg);
    padding:16px 0 12px;margin-top:2px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .search{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:9px 13px;
    box-shadow:0 1px 3px var(--shadow)}
  .search input{flex:1;border:0;background:transparent;color:var(--ink);font-size:15px;outline:none}
  .search svg{flex:none;opacity:.6}
  .daysel{background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:11px;padding:9px 12px;font-size:14px;font-weight:600;cursor:pointer;
    box-shadow:0 1px 3px var(--shadow)}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:11px}
  .chip{cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.02em;
    color:var(--chipink);background:var(--chip);border:1px solid var(--line);
    padding:6px 12px;border-radius:999px;transition:.15s;user-select:none}
  .chip:hover{border-color:var(--accent)}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  html[data-theme="light"] .chip.active{color:#fff}

  .lede{color:var(--muted);font-size:15px;margin:14px 0 4px;padding:15px 17px;background:var(--panel);
    border:1px solid var(--line);border-radius:13px;box-shadow:0 1px 4px var(--shadow)}
  .lede b{color:var(--ink)}
  .count{font-size:12.5px;color:var(--muted);margin:16px 2px 2px}

  .item{background:var(--panel);border:1px solid var(--line);border-radius:15px;
    padding:19px 22px;margin:15px 0;position:relative;overflow:hidden;
    box-shadow:0 2px 10px var(--shadow);transition:transform .12s,border-color .12s}
  .item:hover{transform:translateY(-1px);border-color:var(--accent)}
  .item:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
  .item .tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:9px}
  .tag{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
    color:var(--accent2);background:var(--chip);border:1px solid var(--line);
    padding:3px 9px;border-radius:999px}
  .item h2{font-size:18.5px;margin:2px 0 8px;line-height:1.3}
  .why{margin:9px 0 4px}
  .why b{color:var(--accent2)}
  .src{font-size:12.5px;color:var(--muted);margin-top:12px;border-top:1px dashed var(--line);padding-top:9px}
  .src a{color:var(--accent);text-decoration:none}
  .src a:hover{text-decoration:underline}

  .section-label{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
    font-weight:800;margin:32px 0 6px}
  .box{background:var(--panel2);border:1px solid var(--line);border-radius:15px;
    padding:17px 22px;margin:10px 0;box-shadow:0 1px 6px var(--shadow)}
  .box h3{margin:0 0 6px;font-size:16.5px}
  .box.radar h3{color:var(--warn)}
  .box.try h3{color:var(--accent2)}
  ul{margin:8px 0 0;padding-left:18px}
  li{margin:6px 0}
  .empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:15px}

  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:26px}
  .btn{cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);
    border-radius:10px;padding:9px 14px;font-size:13.5px;font-weight:600;box-shadow:0 1px 3px var(--shadow)}
  .btn:hover{border-color:var(--accent)}

  footer{margin-top:34px;border-top:1px solid var(--line);padding-top:18px;color:var(--muted);font-size:12.5px}
  a{color:var(--accent)}
  @media print{
    .controls,.toggle,.actions{display:none}
    body{background:#fff;color:#111}.item,.box,.lede{background:#fff;box-shadow:none;border-color:#ddd}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="kicker">AI Digest · curated for Vivek</div>
      <h1 id="hTitle">What actually mattered in AI</h1>
      <div class="sub" id="hSub"></div>
    </div>
    <button class="toggle" id="themeBtn" title="Toggle light/dark">🌙 <span>Dark</span></button>
  </header>

  <div class="controls">
    <div class="row">
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input id="search" type="text" placeholder="Search headlines and why-it-matters…" autocomplete="off">
      </div>
      <select class="daysel" id="daySel"></select>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <p class="lede" id="lede"></p>
  <div class="count" id="count"></div>
  <div id="feed"></div>

  <div id="extras">
    <div class="section-label">One thing worth trying</div>
    <div class="box try" id="tryBox"></div>
    <div class="section-label">On the radar</div>
    <div class="box radar" id="radarBox"></div>
  </div>

  <div class="actions">
    <button class="btn" id="printBtn">🖨 Print / Save as PDF</button>
    <button class="btn" id="copyBtn">🔗 Copy shareable text</button>
  </div>

  <footer id="foot"></footer>
</div>

<script>
/* ---- DATA: add a new object to the top of this array each day ---- */
const DIGESTS = [
{
    "date": "2026-07-01",
    "label": "Wed, Jul 1, 2026",
    "gathered": "gathered 9:00 ET",
    "lede": "Not a quiet day: the Data Center Power Coalition launched today to tackle AI's power bottleneck, OpenAI's GPT-5.6 tiering shows how cost-conscious frontier models are getting, and C.H. Robinson's latest release is a real case study of agents <b>running</b> (not just assisting) a supply chain. Also worth noting: Colorado's flagship AI law was quietly gutted and delayed before it ever took effect — a good check on how fast AI policy headlines can go stale.",
    "items": [
      {
        "tags": [
          "Supply chain",
          "Agents"
        ],
        "title": "C.H. Robinson's Lean AI Engineer assesses a full supply chain in 30 minutes, not 4 weeks",
        "why": "Production-grade proof that agentic AI can run live logistics decisions, not just draft recommendations. It pairs with the existing Lean AI Planner, which already manages 92% of C.H. Robinson's global 4PL shipment volume through hundreds of interconnected agents — a solid reference architecture for the supply-chain automation you track.",
        "sources": [
          {
            "label": "C.H. Robinson",
            "url": "https://www.chrobinson.com/en-us/about-us/newsroom/press-releases/2026/ch-robinson-lean-ai-engineer-launch/"
          },
          {
            "label": "FreightWaves",
            "url": "https://www.freightwaves.com/news/c-h-robinsons-next-ai-step-adding-engineer-to-the-planner"
          }
        ],
        "date": "June 3, 2026"
      },
      {
        "tags": [
          "Energy-for-AI",
          "AI-infra"
        ],
        "title": "Data Center Power Coalition launches with 12 founding partners to standardize AI power planning",
        "why": "Confirms your energy-for-AI thesis in real time: the constraint has moved from chips and capital to megawatts and interconnection timelines. A shared \"power playbook\" aims to shorten the multi-year queues gating new data-center capacity — worth tracking who else signs on.",
        "sources": [
          {
            "label": "Data Center Knowledge",
            "url": "https://www.datacenterknowledge.com/energy-power-supply/data-center-power-coalition-launches-to-tackle-ai-s-biggest-bottleneck"
          }
        ],
        "date": "July 1, 2026"
      },
      {
        "tags": [
          "Frontier models",
          "Cost"
        ],
        "title": "OpenAI previews a three-tier GPT-5.6 family — Sol, Terra, Luna — built for long-horizon agent work",
        "why": "Sol targets frontier reasoning for agentic tasks, while Terra and Luna trade capability for cost — the tiering that decides whether always-on agents are economical at scale. Access is currently gated to limited preview partners, reportedly at the direction of the US government, which is itself worth watching.",
        "sources": [
          {
            "label": "OpenAI",
            "url": "https://openai.com/index/previewing-gpt-5-6-sol/"
          },
          {
            "label": "VentureBeat",
            "url": "https://venturebeat.com/technology/openai-unveils-gpt-5-6-sol-terra-and-luna-models-but-only-accessible-to-limited-preview-partners-for-now-per-us-gov"
          }
        ],
        "date": "June 26, 2026"
      },
      {
        "tags": [
          "Funding",
          "AI-infra"
        ],
        "title": "Qualcomm nears ~$3.9B deal for AI-software startup Modular",
        "why": "A chipmaker buying an inference-software stack, rather than raising its own model lab, is another data point for the picks-and-shovels thesis: value is migrating to whoever makes models run fast and cheap on non-Nvidia hardware. Deal expected to close in H2 2026 — watch the terms and Nvidia's competitive response.",
        "sources": [
          {
            "label": "CNBC",
            "url": "https://www.cnbc.com/2026/06/24/qualcomm-ai-chip-modular-software.html"
          }
        ],
        "date": "reported June 24, 2026"
      },
      {
        "tags": [
          "Policy",
          "Reality check"
        ],
        "title": "Colorado's landmark \"high-risk AI\" law gutted and delayed to 2027 before it ever took effect",
        "why": "The law was set to become the first comprehensive US high-risk-AI statute on June 30, 2026. Instead, Governor Polis signed SB 189 on May 14, stripping the algorithmic-discrimination duty of care and impact-assessment requirements and pushing a much narrower version to January 1, 2027. A reminder not to build a compliance roadmap around a single headline.",
        "sources": [
          {
            "label": "Norton Rose Fulbright",
            "url": "https://www.nortonrosefulbright.com/en-us/knowledge/publications/18733d31/colorado-enacts-revised-ai-law"
          }
        ],
        "date": "signed May 14, 2026 (original effective date was June 30, 2026)"
      },
      {
        "tags": [
          "Agents",
          "Enterprise",
          "Market signal"
        ],
        "title": "NVIDIA opens its Agent Toolkit as Adobe, SAP, ServiceNow, Salesforce and others build on it",
        "why": "The adopter list for NVIDIA's open-source toolkit for self-evolving enterprise agents reads like a who's-who of the agent-orchestration land grab, alongside OpenAI and Microsoft. This layer — not any single model — will decide lock-in and switching costs for the agent tooling you're evaluating.",
        "sources": [
          {
            "label": "NVIDIA Newsroom",
            "url": "https://nvidianews.nvidia.com/news/ai-agents"
          }
        ],
        "date": "2026"
      }
    ],
    "tryBox": {
      "h": "Prototype with NVIDIA's open-source Agent Toolkit",
      "body": "NVIDIA just open-sourced the software behind its self-evolving enterprise agents, and Adobe, SAP, ServiceNow and others are already building on it. Concrete, low-cost experiment for this week: pull the toolkit and prototype one narrow supply-chain or ops workflow as an agent, rather than waiting for a vendor platform to mature.",
      "src": "<a href=\"https://nvidianews.nvidia.com/news/ai-agents\">NVIDIA Agent Toolkit</a> · announced 2026"
    },
    "radar": [
      "<b>Qualcomm–Modular deal.</b> The ~$3.9B acquisition is expected to close in H2 2026 — watch how Nvidia responds competitively in the inference-software layer.",
      "<b>EU AI Act transparency rules.</b> Labeling/marking requirements for AI-generated content are set to take effect in August 2026 — relevant if any portfolio companies operate in the EU."
    ]
  }
];

/* ---- APP ---- */
const $ = s => document.querySelector(s);
let state = { dayIndex:0, query:"", tag:"All" };

function allTags(day){
  const set = new Set();
  day.items.forEach(it => it.tags.forEach(t => set.add(t)));
  return ["All", ...set];
}

function render(){
  const day = DIGESTS[state.dayIndex];
  $("#hSub").innerHTML = day.label + " · " + day.gathered + " · filtered to agents, supply chain &amp; AI-infra investing";
  $("#lede").innerHTML = day.lede;

  // chips
  const chips = $("#chips"); chips.innerHTML = "";
  allTags(day).forEach(t=>{
    const c = document.createElement("span");
    c.className = "chip" + (state.tag===t ? " active":"");
    c.textContent = t;
    c.onclick = ()=>{ state.tag = t; render(); };
    chips.appendChild(c);
  });

  // filter
  const q = state.query.trim().toLowerCase();
  const items = day.items.filter(it=>{
    const tagOk = state.tag==="All" || it.tags.includes(state.tag);
    const text = (it.title + " " + it.why + " " + it.tags.join(" ")).toLowerCase();
    const qOk = !q || text.includes(q);
    return tagOk && qOk;
  });

  $("#count").textContent = items.length + " of " + day.items.length + " items" +
    (state.tag!=="All" ? " · " + state.tag : "") + (q ? ' · “'+state.query+'”' : "");

  const feed = $("#feed"); feed.innerHTML = "";
  if(!items.length){
    feed.innerHTML = '<div class="empty">No items match. Try clearing the filter or search.</div>';
  }
  items.forEach(it=>{
    const el = document.createElement("div");
    el.className = "item";
    const tags = it.tags.map(t=>'<span class="tag">'+t+'</span>').join("");
    const srcs = it.sources.map(s=>'<a href="'+s.url+'" target="_blank" rel="noopener">'+s.label+'</a>').join(" · ");
    el.innerHTML =
      '<div class="tags">'+tags+'</div>'+
      '<h2>'+it.title+'</h2>'+
      '<p class="why"><b>Why it matters to you:</b> '+it.why+'</p>'+
      '<p class="src">Source: '+srcs+' · '+it.date+'</p>';
    feed.appendChild(el);
  });

  // extras only when unfiltered
  const showExtras = state.tag==="All" && !q;
  $("#extras").style.display = showExtras ? "block":"none";
  if(showExtras){
    $("#tryBox").innerHTML = '<h3>'+day.tryBox.h+'</h3><p>'+day.tryBox.body+'</p><p class="src">'+day.tryBox.src+'</p>';
    $("#radarBox").innerHTML = '<h3>Things building</h3><ul>'+day.radar.map(r=>'<li>'+r+'</li>').join("")+'</ul>';
  }

  $("#foot").innerHTML = "Digest for "+day.label+". Items filtered against your profile (agents, supply chain, AI-infra &amp; energy investing). "+
    "Dates and sources verified where possible; unpinned dates and single-source claims flagged inline. "+
    "Investing tie-ins are information for your own research, not personalized buy/sell advice.";
}

// day selector
(function(){
  const sel = $("#daySel");
  DIGESTS.forEach((d,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=d.label; sel.appendChild(o); });
  sel.onchange = e=>{ state.dayIndex = +e.target.value; state.tag="All"; state.query=""; $("#search").value=""; render(); };
})();

$("#search").addEventListener("input", e=>{ state.query = e.target.value; render(); });

// theme
function setTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  $("#themeBtn").innerHTML = t==="light" ? "☀️ <span>Light</span>" : "🌙 <span>Dark</span>";
  try{ localStorage.setItem("aidigest-theme", t); }catch(e){}
}
$("#themeBtn").onclick = ()=>{
  const cur = document.documentElement.getAttribute("data-theme")==="light" ? "light":"dark";
  setTheme(cur==="light" ? "dark":"light");
};
(function(){ let t="dark"; try{ t = localStorage.getItem("aidigest-theme")||"dark"; }catch(e){} setTheme(t); })();

// actions
$("#printBtn").onclick = ()=>window.print();
$("#copyBtn").onclick = ()=>{
  const day = DIGESTS[state.dayIndex];
  let txt = "AI Digest — "+day.label+"\n\n";
  day.items.forEach(it=>{ txt += "• "+it.title+"\n  Why: "+it.why.replace(/<[^>]+>/g,"")+"\n  ("+it.sources.map(s=>s.url).join(", ")+")\n\n"; });
  navigator.clipboard.writeText(txt).then(()=>{
    const b=$("#copyBtn"); const o=b.textContent; b.textContent="✓ Copied!"; setTimeout(()=>b.textContent=o,1500);
  });
};

render();
</script>
</body>
</html>
